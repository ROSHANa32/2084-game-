<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1226" />
  <meta name="description" content="Fusion — a calming number merge puzzle. Swipe to combine matching tiles and chase the 2048 tile. Free, offline, mobile-first." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Fusion — Number Merge Puzzle</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span>F</span>
        </div>
        <div class="brand-text">
          <h1>Fusion</h1>
          <p>Merge the numbers</p>
        </div>
      </div>

      <div class="scores">
        <div class="score-card">
          <span class="score-label">Score</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-card">
          <span class="score-label">Best</span>
          <span class="score-value" id="best">0</span>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <p class="hint" id="hint">Swipe to move tiles. Equal numbers fuse into one!</p>
      <div class="tool-buttons">
        <button class="btn btn-primary" id="new-game" type="button">New Game</button>
      </div>
    </section>

    <main class="board-wrap">
      <div class="board" id="board" aria-label="Game board" role="grid">
        <div class="grid-bg" id="grid-bg"></div>
        <div class="tiles" id="tiles"></div>

        <div class="overlay" id="overlay" hidden>
          <div class="overlay-card">
            <h2 id="overlay-title">Nice!</h2>
            <p id="overlay-text">You reached a new milestone.</p>
            <div class="overlay-actions" id="overlay-actions"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Use arrow keys, <kbd>W A S D</kbd>, or swipe. Built for fun — original game, no affiliations.</p>
    </footer>
  </div>

  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
