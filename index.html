<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#070a1f" />
  <meta name="description" content="Fusion — a calming number merge puzzle. Swipe to combine matching tiles and chase the 2048 tile. Free, offline, mobile-first." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Fusion — Number Merge Puzzle</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=12" />
</head>
<body>
  <!-- Deep-space background: nebula glow + twinkling star layers -->
  <div class="space-bg" aria-hidden="true">
    <div class="stars stars-sm"></div>
    <div class="stars stars-md"></div>
    <div class="stars stars-lg"></div>
    <i class="glow-star gs1"></i>
    <i class="glow-star gs2"></i>
    <i class="glow-star gs3"></i>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="icons/icon-512.png" alt="Fusion logo" width="46" height="46" />
        </div>
        <div class="brand-text">
          <h1>Fusion</h1>
          <p>Merge the numbers</p>
        </div>
      </div>

      <div class="scores">
        <div class="score-card">
          <span class="score-label">Score</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-card">
          <span class="score-label">Best</span>
          <span class="score-value" id="best">0</span>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <p class="hint" id="hint">Swipe to move tiles. Equal numbers fuse into one!</p>
      <div class="tool-buttons">
        <button class="btn btn-icon" id="sound-toggle" type="button" aria-label="Mute sound" aria-pressed="true"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M4 9v6h4l5 4V5L8 9H4z"/><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" d="M16 8.5a5 5 0 0 1 0 7M18.5 6a8.5 8.5 0 0 1 0 12"/></svg></button>
        <button class="btn btn-primary" id="new-game" type="button">New Game</button>
      </div>
    </section>

    <main class="board-wrap">
      <div class="board" id="board" aria-label="Game board" role="grid">
        <span class="corner corner-tl" aria-hidden="true"></span>
        <span class="corner corner-tr" aria-hidden="true"></span>
        <span class="corner corner-bl" aria-hidden="true"></span>
        <span class="corner corner-br" aria-hidden="true"></span>

        <div class="grid-bg" id="grid-bg"></div>
        <div class="tiles" id="tiles"></div>

        <div class="overlay" id="overlay" hidden>
          <div class="overlay-card">
            <h2 id="overlay-title">Nice!</h2>
            <p id="overlay-text">You reached a new milestone.</p>
            <div class="overlay-actions" id="overlay-actions"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Use arrow keys, <kbd>W A S D</kbd>, or swipe. Built for fun — original game, no affiliations.</p>
    </footer>
  </div>

  <!-- Decorative sparkle accent -->
  <div class="sparkle" aria-hidden="true">
    <svg viewBox="0 0 24 24" width="26" height="26">
      <path d="M12 2c.4 4.6 2.4 6.6 7 7-4.6.4-6.6 2.4-7 7-.4-4.6-2.4-6.6-7-7 4.6-.4 6.6-2.4 7-7z"
            fill="currentColor" />
    </svg>
  </div>

  <script src="js/sound.js?v=12"></script>
  <script src="js/game.js?v=12"></script>
  <script src="js/app.js?v=12"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // Reload once when a new service worker takes control, so the
      // freshest version is shown without a manual hard-refresh.
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // If an updated worker is waiting, activate it immediately.
          if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage('SKIP_WAITING');
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
